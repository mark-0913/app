<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Blenderポートフォリオ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Blender作品ポートフォリオ</h1>

<main>

  <!-- 作品1（画像） -->
  <div class="work">
    <div class="media">
      <img src="images/book1984_2.png" alt="本">
    </div>
    <div class="text">
     <h2>作品1：本</h2>
      <p>シェーディングの練習として合成皮革カバーの質感
	ページ側面の重なりの表現を意識。</p>

    </div>
  </div>  

  <!-- 作品1（動画） -->
  <div class="work">
    <div class="media">
      <video controls autoplay loop muted>
        <source src="videos/book1984.mp4" type="video/mp4">
      </video>
    </div>

  </div>



  <!-- 作品2（画像） -->
  <div class="work">
    <div class="media">
      <img src="images/ロッカー2.png" alt="ロッカー">
    </div>
    <div class="text">
      <h2>作品2：ロッカー</h2>
      <p>後で書く</p>
    </div>
  </div>

  <!-- 作品3（画像） -->
  <div class="work">
    <div class="media">
      <img src="images/snowglobe.png" alt="スノードーム">
    </div>
    <div class="text">
      <h2>作品3：スノードーム</h2>
      <p>雪の表現に。</p>
    </div>
  </div>

  <!-- 作品3（動画） -->
  <div class="work">
    <div class="media">
      <video controls autoplay loop muted>
        <source src="videos/snowglobe.mp4" type="video/mp4">
      </video>
    </div>

  </div>

</main>

</body>
</html>
