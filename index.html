<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blenderポートフォリオ</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas class="custom-cursor" id="customCursor" aria-hidden="true"></canvas>

  <header class="hero">
    <div class="hero-content">
      <div class="hero-copy">
        <h1>Blender Gallery</h1>
        <p>3DCG Works</p>
        <a class="github-button" href="https://github.com/mark-0913" target="_blank" rel="noopener noreferrer">
          GitHub
        </a>
      </div>

      <div class="suzanne-stage" aria-hidden="true">
        <canvas class="suzanne-canvas" id="suzanneCanvas"></canvas>
      </div>
    </div>
  </header>

  <main class="portfolio" aria-live="polite">
    <section class="featured-work" aria-label="選択中の作品">
      <div class="featured-media zoom-lock" id="featuredMedia"></div>
      <div class="featured-copy">
        <p class="work-count" id="workCount"></p>
        <h2 id="featuredTitle"></h2>
        <p id="featuredDescription"></p>
        <div class="source-links" id="featuredSources" hidden></div>
      </div>
    </section>

    <section class="thumbnail-section" aria-label="作品一覧">
      <div class="thumbnail-grid" id="thumbnailGrid"></div>
    </section>
  </main>

  <script src="script.js"></script>
  <script type="module" src="monkey-model.js"></script>
  <script type="module" src="cursor-model.js"></script>
</body>
</html>
