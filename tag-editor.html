<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品タグ編集</title>
  <link rel="stylesheet" href="tag-editor.css">
</head>
<body>
  <header class="editor-header">
    <div>
      <p class="eyebrow">Blender Gallery</p>
      <h1>作品タグ編集</h1>
    </div>
    <div class="editor-actions">
      <button id="copyJson" type="button">JSONをコピー</button>
      <button id="downloadJson" type="button">works.jsonをダウンロード</button>
      <a href="index.html">ギャラリーへ戻る</a>
    </div>
  </header>

  <main>
    <section class="editor-status" aria-live="polite">
      <p id="statusMessage">data/works.json を読み込んでいます。</p>
      <label class="search-box">
        <span>検索</span>
        <input id="workSearch" type="search" placeholder="作品名・ID・タグ">
      </label>
    </section>

    <section class="work-list" id="workList" aria-label="作品タグ一覧"></section>
  </main>

  <template id="workTemplate">
    <article class="work-card">
      <img class="work-image" alt="">
      <div class="work-body">
        <div class="work-heading">
          <p class="work-id"></p>
          <h2></h2>
        </div>
        <div class="legacy-tags"></div>
        <div class="tag-groups"></div>
      </div>
    </article>
  </template>

  <script src="tag-editor.js"></script>
</body>
</html>
